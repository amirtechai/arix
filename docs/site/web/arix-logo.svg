<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Arix logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EBEAA"/>
      <stop offset="55%" stop-color="#16D5C4"/>
      <stop offset="100%" stop-color="#7DF0DF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A8478" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0EBEAA"/>
    </linearGradient>
  </defs>
  <!-- rounded square base -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#g)"/>
  <!-- Inner glow ring -->
  <rect x="32" y="32" width="192" height="192" rx="38" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="2"/>
  <!-- Stylised "A" + caret/code brackets -->
  <g fill="none" stroke="#0E2E2A" stroke-linecap="round" stroke-linejoin="round" stroke-width="14">
    <!-- Left bracket -->
    <path d="M68 86 L48 128 L68 170"/>
    <!-- Right bracket -->
    <path d="M188 86 L208 128 L188 170"/>
    <!-- A glyph (centred) -->
    <path d="M92 174 L128 78 L164 174"/>
    <path d="M104 144 L152 144" stroke-width="12"/>
  </g>
  <!-- Cursor blink under the A -->
  <rect x="120" y="186" width="16" height="6" rx="2" fill="#0E2E2A"/>
</svg>
